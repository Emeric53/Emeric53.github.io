# 项目信息
site_name: 梁梦磊
site_author: Menglei Liang
site_description: Menglei Liang's nullspace.
site_url: https://emeric53.github.io/

# 代码仓库信息
repo_name: Emeric53/Emeric53.github.io
repo_url: https://github.com/Emeric53/Emeric53.github.io/

# 版权信息
copyright: Copyright &copy; 2024 ~ now | 🦩 Menglei Liang

theme:
  name: material
  language: zh
  custom_dir: overrides
  icon:
    logo: material/telescope
    repo: fontawesome/brands/github
  features:
    - navigation.indexes
    - navigation.tabs
    - navigation.sections
    - toc.follow
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.tooltips
    - navigation.tracking
    - navigation.footer
    - navigation.file_type_icons
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline 
        name: Switch to dark mode
      primary: teal
      accent: purple 
    - scheme: slate 
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode    
      primary: cyan
      accent: lime
  font:
    text: Google Sans
    code: JetBrains Mono

# Social Links
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Emeric53
    - icon: fontawesome/solid/envelope
      link: mailto:todayislml@gmail.com
  # giscus 评论 + 点赞（基于 GitHub Discussions）
  # 配置步骤：1) 仓库 Settings 开启 Discussions；2) 安装 https://github.com/apps/giscus
  # 3) 打开 https://giscus.app 选 pathname 映射，复制 repo_id 与 category_id 填到下方。
  # 四个值任一为空时，文章页不会渲染评论区。
  giscus:
    repo: "Emeric53/Emeric53.github.io"
    repo_id: "R_kgDONTudTA"
    category: "Comments"
    category_id: "DIC_kwDONTudTM4C_D6i"

# Plugins
plugins: 
  - search:
      lang:
        - en
        - zh
  - awesome-pages
  # 月记：按时间排列的博客实例（blog 必须排在 awesome-pages 之后）
  - blog:
      blog_dir: monthly
      post_url_format: "{slug}"
      post_readtime: false      # 阅读时长全站统一用 hooks/reading_time.py，关掉自带的避免割裂
      authors: false
      categories: false
      pagination_per_page: 10
  # 生活杂谈：第二个博客实例
  - blog:
      blog_dir: life
      post_url_format: "{slug}"
      post_readtime: false
      authors: false
      categories: false
      pagination_per_page: 10
  - tags
  - social:
      cards_layout_options:
        font_family: Noto Sans SC
  - glightbox
  - git-revision-date-localized:
      type: timeago
      locale: zh
      enable_creation_date: true
      enable_git_follow: false
      fallback_to_build_date: true
  - rss:
      match_path: (monthly|life|academic)/.*|technology/[^/]+\.md
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
  - minify:
      minify_html: true

# Hooks
hooks:
  - hooks/reading_time.py

# Extra Configuration
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/pangu@4.0.7/dist/browser/pangu.min.js
  - javascripts/pangu_init.js

extra_css:
  - stylesheets/extra.css

# Markdown Extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
